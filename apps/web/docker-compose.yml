version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ainexus-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ainexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d ainexus" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
